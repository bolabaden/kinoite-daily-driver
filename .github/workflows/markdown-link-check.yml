# Relative file targets in *.md (skips .git, .history, .cursor, .firecrawl).
# Local pre-push: scripts/check-md-links.ps1
name: Markdown link check

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch: # re-run or dry-check in Actions tab

concurrency:
  group: "md-links-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  check-md-links:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Run check-md-links.ps1
        run: |
          & "${env:SystemRoot}\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -ExecutionPolicy Bypass -File "${{ github.workspace }}\scripts\check-md-links.ps1"
